name: VEXEO Release Finalize

# Cuando el build por tag termina: (1) publica copias de los instaladores con
# NOMBRE FIJO VEXEO (para que la web enlace a releases/latest/download/<nombre>
# sin que la URL cambie al subir de versión), y (2) quita el flag prerelease y
# marca la release como "latest" para que el update-check de los clientes la vea.
# Se hace al FINAL para que ningún cliente descargue de una release a medio subir.
#
# Nota: conclusiones 'cancelled'/'timed_out' NO se finalizan (la release queda
# en prerelease); el remedio es re-lanzar "Flutter Tag Build".
on:
  workflow_run:
    workflows: ["Flutter Tag Build"]
    types: [completed]

permissions:
  contents: write

jobs:
  finalize:
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Publicar assets con nombre fijo VEXEO y marcar latest
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.workflow_run.head_branch }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail
          # En builds disparados por push de tag, head_branch es el nombre del tag.
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "'$TAG' no es un tag de release VEXEO — nada que hacer."; exit 0
          fi
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "No existe release para el tag $TAG — nada que finalizar."; exit 0
          fi

          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          # origen (con versión) -> nombre fijo de marca VEXEO
          declare -A MAP=(
            ["rustdesk-$TAG-x86_64.exe"]="VEXEO-Soporte-Remoto-Windows.exe"
            ["rustdesk-$TAG-x86_64.msi"]="VEXEO-Soporte-Remoto-Windows.msi"
            ["rustdesk-$TAG-aarch64.dmg"]="VEXEO-Soporte-Remoto-Mac-AppleSilicon.dmg"
            ["rustdesk-$TAG-x86_64.dmg"]="VEXEO-Soporte-Remoto-Mac-Intel.dmg"
            ["rustdesk-$TAG-universal.apk"]="VEXEO-Soporte-Remoto-Android.apk"
          )

          # Con build fallido, solo finalizamos si están los instaladores clave.
          if [[ "$CONCLUSION" == "failure" ]]; then
            for req in "rustdesk-$TAG-x86_64.exe" "rustdesk-$TAG-x86_64.dmg" "rustdesk-$TAG-aarch64.dmg"; do
              if ! grep -qx "$req" <<< "$assets"; then
                echo "::warning::Build con fallos y falta $req — release $TAG se queda en prerelease."; exit 0
              fi
            done
          fi

          work=$(mktemp -d); cd "$work"
          for src in "${!MAP[@]}"; do
            dst="${MAP[$src]}"
            if grep -qx "$src" <<< "$assets"; then
              rm -f "$src" "$dst"
              gh release download "$TAG" --repo "$REPO" -p "$src"
              cp "$src" "$dst"
              gh release upload "$TAG" --repo "$REPO" "$dst" --clobber
              echo "  ✓ $dst"
            else
              echo "  ⚠ no está $src (plataforma no compilada) — salto"
            fi
          done
          cd / && rm -rf "$work"

          gh release edit "$TAG" --repo "$REPO" --prerelease=false --latest
          echo "Release $TAG finalizada y marcada como latest."
